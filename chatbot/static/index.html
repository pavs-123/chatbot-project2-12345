<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - RAG + Weather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .status-bar {
            background: #f3f4f6;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
            font-size: 13px;
            color: #6b7280;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .avatar.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .avatar.bot {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .sources {
            margin-top: 8px;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 8px;
            font-size: 12px;
            color: #6b7280;
        }

        .sources strong {
            color: #374151;
        }

        .input-container {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .upload-btn {
            padding: 6px 12px;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #374151;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            background: #e5e7eb;
        }

        .file-input {
            display: none;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
            cursor: pointer;
        }

        .checkbox-label input {
            cursor: pointer;
        }

        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            min-height: 60px;
            max-height: 150px;
        }

        textarea:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s;
            height: fit-content;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 12px 18px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: fit-content;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.show {
            display: flex;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* Scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #9ca3af;
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Chatbot</h1>
            <div class="header-buttons">
                <button class="btn btn-secondary" onclick="viewHistory()">📜 History</button>
                <button class="btn btn-secondary" onclick="downloadHistory()">💾 Save</button>
                <button class="btn btn-danger" onclick="clearChat()">🗑️ Clear</button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Connected</span>
            </div>
            <div>
                <span id="session-id">Session: Loading...</span>
            </div>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="message bot">
                <div class="avatar bot">AI</div>
                <div class="message-content">
                    👋 Hello! I'm your AI assistant powered by RAG (Retrieval Augmented Generation).
                    <br><br>
                    I can help you with:
                    <br>📚 Answer questions from your documents
                    <br>🌤️ Check weather in any city
                    <br>📤 Upload new documents to learn from
                    <br><br>
                    Try asking me something!
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-group">
                    <div class="input-toolbar">
                        <label class="upload-btn">
                            📎 Upload Document
                            <input type="file" class="file-input" id="file-input" accept=".txt,.md,.pdf" onchange="uploadFile()">
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="reingest-checkbox">
                            Re-index documents
                        </label>
                    </div>
                    <textarea 
                        id="message-input" 
                        placeholder="Type your message here... (e.g., 'What's in the docs?' or 'Weather in London?')"
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                </div>
                <button class="send-btn" onclick="sendMessage()" id="send-btn">
                    Send 🚀
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toast-message"></span>
    </div>

    <script>
        let sessionId = null;
        let isProcessing = false;

        // Initialize session
        async function initSession() {
            // Generate or retrieve session ID
            sessionId = localStorage.getItem('chatbot_session_id') || generateSessionId();
            localStorage.setItem('chatbot_session_id', sessionId);
            document.getElementById('session-id').textContent = `Session: ${sessionId.slice(0, 8)}...`;
            
            // Load previous history if exists
            await loadHistory();
        }

        function generateSessionId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        async function loadHistory() {
            try {
                const response = await fetch(`/history/${sessionId}`);
                if (response.ok) {
                    const data = await response.json();
                    const chatContainer = document.getElementById('chat-container');
                    
                    // Clear welcome message if there's history
                    if (data.messages && data.messages.length > 0) {
                        chatContainer.innerHTML = '';
                        
                        data.messages.forEach(msg => {
                            addMessage(msg.role, msg.content, false);
                        });
                    }
                }
            } catch (error) {
                console.log('No previous history found');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;
            
            isProcessing = true;
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            
            // Add user message
            addMessage('user', message);
            input.value = '';
            
            // Show typing indicator
            showTyping();
            
            try {
                const reingest = document.getElementById('reingest-checkbox').checked;
                
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        reingest: reingest
                    })
                });
                
                const data = await response.json();
                
                // Hide typing indicator
                hideTyping();
                
                // Add bot response
                addMessage('assistant', data.answer, true, data.sources);
                
                // Update session ID if new
                if (data.session_id) {
                    sessionId = data.session_id;
                    localStorage.setItem('chatbot_session_id', sessionId);
                    document.getElementById('session-id').textContent = `Session: ${sessionId.slice(0, 8)}...`;
                }
                
            } catch (error) {
                hideTyping();
                addMessage('assistant', '❌ Sorry, something went wrong. Please try again.');
                showToast('Error: ' + error.message, 'error');
            }
            
            isProcessing = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send 🚀';
        }

        function addMessage(role, content, scroll = true, sources = null) {
            const chatContainer = document.getElementById('chat-container');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${role === 'user' ? 'user' : 'bot'}`;
            avatar.textContent = role === 'user' ? 'You' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            // Add sources if available
            if (sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources';
                sourcesDiv.innerHTML = `<strong>Sources:</strong> ${sources.join(', ')}`;
                contentDiv.appendChild(sourcesDiv);
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            
            if (scroll) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function showTyping() {
            const chatContainer = document.getElementById('chat-container');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'message bot';
            typingDiv.innerHTML = `
                <div class="avatar bot">AI</div>
                <div class="typing-indicator show">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function uploadFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            showToast(`Uploading ${file.name}...`, 'success');
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast(`✅ ${data.message}`, 'success');
                    // Auto-check reingest
                    document.getElementById('reingest-checkbox').checked = true;
                } else {
                    showToast(`❌ Upload failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                showToast(`❌ Upload error: ${error.message}`, 'error');
            }
            
            fileInput.value = '';
        }

        async function clearChat() {
            if (!confirm('Clear conversation history?')) return;
            
            try {
                await fetch(`/history/${sessionId}`, { method: 'DELETE' });
                
                // Clear UI
                const chatContainer = document.getElementById('chat-container');
                chatContainer.innerHTML = '';
                
                // Add welcome message
                addMessage('bot', '👋 Chat cleared! How can I help you?');
                
                showToast('✅ Chat history cleared', 'success');
            } catch (error) {
                showToast('❌ Failed to clear history', 'error');
            }
        }

        async function viewHistory() {
            try {
                const response = await fetch(`/history/${sessionId}`);
                const data = await response.json();
                
                alert(`Session: ${data.session_id}\nMessages: ${data.messages.length}\n\nCheck browser console for full history.`);
                console.log('Chat History:', data);
            } catch (error) {
                showToast('❌ Failed to load history', 'error');
            }
        }

        async function downloadHistory() {
            try {
                const response = await fetch(`/history/${sessionId}`);
                const data = await response.json();
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `chat-history-${sessionId.slice(0, 8)}.json`;
                a.click();
                
                showToast('✅ History downloaded', 'success');
            } catch (error) {
                showToast('❌ Failed to download history', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            
            toast.className = `toast ${type} show`;
            toastMessage.textContent = message;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Initialize on load
        window.onload = initSession;
    </script>
</body>
</html>
